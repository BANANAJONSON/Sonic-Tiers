<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sonic Tiers - Maintenance</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0a0f2c, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Container */
.container {
  text-align: center;
  animation: fadeIn 2s ease;
}

/* Sonic-style glowing title */
h1 {
  font-size: 60px;
  color: #00c3ff;
  text-shadow: 0 0 10px #00c3ff, 0 0 30px #0077ff;
  margin-bottom: 10px;
}

/* Subtitle */
h2 {
  font-size: 28px;
  margin-bottom: 20px;
  color: #ffffffcc;
}

/* Message */
p {
  font-size: 18px;
  color: #aaa;
  max-width: 500px;
  margin: auto;
}

/* Spinner */
.loader {
  margin: 40px auto;
  border: 6px solid #222;
  border-top: 6px solid #00c3ff;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  animation: spin 1s linear infinite;
}

/* Footer */
.footer {
  position: absolute;
  bottom: 20px;
  font-size: 14px;
  color: #666;
}

/* Animations */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Floating particles */
.particle {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #00c3ff;
  border-radius: 50%;
  opacity: 0.7;
  animation: float 10s linear infinite;
}

@keyframes float {
  from {
    transform: translateY(100vh);
    opacity: 0;
  }
  to {
    transform: translateY(-10vh);
    opacity: 1;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Sonic Tiers</h1>
  <h2>⚙️ Maintenance Mode</h2>
  <div class="loader"></div>
  <p>
    We're upgrading the speed and rankings!  
    Sonic Tiers is currently under maintenance.  
    Please check back soon 🚀
  </p>
</div>

<div class="footer">
  © 2026 Sonic Tiers
</div>

<!-- Particles -->
<script>
for (let i = 0; i < 30; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "vw";
  p.style.animationDuration = (5 + Math.random() * 5) + "s";
  p.style.opacity = Math.random();
  document.body.appendChild(p);
}
</script>

</body>
</html>
